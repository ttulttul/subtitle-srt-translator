name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14-dev"
          - "3.15-dev"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7

      - name: Sync
        run: uv sync --python "$(python -c 'import sys; print(sys.executable)')"

      - name: Test
        run: uv run pytest

      - name: CLI smoke
        run: uv run subtitle-srt-translator --help
